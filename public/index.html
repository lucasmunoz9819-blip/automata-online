<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Autómata</title>
<style>body{margin:0;background:#08110e;color:#e8f5ee;font:16px system-ui}main{max-width:820px;margin:8vh auto;padding:24px}.card{background:#101d18;border:1px solid #294638;border-radius:18px;padding:24px;box-shadow:0 20px 70px #0008}h1{font-size:clamp(32px,7vw,64px);margin:0;color:#70f0ac}button,input{font:inherit;border-radius:9px;padding:10px 14px}button{border:0;background:#70f0ac;color:#052113;font-weight:700;cursor:pointer}input{border:1px solid #426b57;background:#09130f;color:white;width:min(420px,90%)}pre{white-space:pre-wrap;background:#07100c;padding:16px;border-radius:10px;min-height:120px}.row{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.muted{color:#98b5a6}</style></head>
<body><main><p class="muted">AGENTE PERSISTENTE · AUDITABLE</p><h1>Autómata</h1><div class="card"><p>Introduce el token administrativo para consultar y controlar esta instancia.</p><input id="token" type="password" placeholder="Token administrativo"><div class="row"><button onclick="callApi('/api/status')">Estado</button><button onclick="callApi('/api/public-context?source=weather')">Contexto público</button><button onclick="callApi('/api/tick','POST')">Ejecutar turno</button><button onclick="callApi('/api/run/start','POST')">Iniciar ciclo</button><button onclick="callApi('/api/run/stop','POST')">Detener</button></div><pre id="out">Esperando…</pre></div></main>
<script>async function callApi(path,method='GET'){const out=document.querySelector('#out');out.textContent='Procesando…';try{const r=await fetch(path,{method,headers:{authorization:'Bearer '+document.querySelector('#token').value}});out.textContent=JSON.stringify(await r.json(),null,2)}catch(e){out.textContent=e.message}}</script></body></html>
