name: Latido del agente
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Procesar pedidos pagados
        env:
          AUTOMATA_URL: ${{ secrets.AUTOMATA_URL }}
          AUTOMATA_ADMIN_TOKEN: ${{ secrets.AUTOMATA_ADMIN_TOKEN }}
        run: |
          test -n "$AUTOMATA_URL"
          test -n "$AUTOMATA_ADMIN_TOKEN"
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer $AUTOMATA_ADMIN_TOKEN" \
            "$AUTOMATA_URL/api/tick"
